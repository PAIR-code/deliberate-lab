name: Auto-merge Dependabot PRs

# Uses pull_request (not pull_request_target) intentionally. This workflow
# never checks out PR code — it only calls gh CLI commands — so the reduced
# token permissions of pull_request are sufficient and safer.
on: pull_request

# Required for gh pr review (pull-requests: write) and gh pr merge (contents: write).
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge patch and minor updates only. Major version bumps are
      # excluded because they are more likely to contain breaking changes
      # and should be reviewed manually.
      - name: Approve and auto-merge (patch and minor only)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
